name: Release Plugin Repository

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate tag format and plugin version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the format vX.Y.Z. Got: $tag" >&2
            exit 1
          fi

          ./gradlew --no-daemon writePluginReleaseMetadata

          metadata_file="build/plugin-release-metadata/plugin.properties"
          plugin_version="$(grep '^pluginVersion=' "$metadata_file" | cut -d= -f2-)"

          if [[ "$plugin_version" != "${tag#v}" ]]; then
            echo "Tag $tag does not match build.gradle.kts version $plugin_version" >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Build plugin and custom repository
        run: |
          ./gradlew --no-daemon buildPlugin generateCustomPluginRepository \
            -PreleaseTag="${GITHUB_REF_NAME}" \
            -PcustomPluginRepositoryBaseUrl="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/custom-plugin-repository

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
