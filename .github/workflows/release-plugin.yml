name: Release Plugin Repository

on:
  push:
    branches:
      - main
    paths:
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "schema-cache/**"
      - "src/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read plugin version
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew --no-daemon writePluginReleaseMetadata

          metadata_file="build/plugin-release-metadata/plugin.properties"
          plugin_version="$(grep '^pluginVersion=' "$metadata_file" | cut -d= -f2-)"

          if [[ ! "$plugin_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Plugin version must use semantic versioning X.Y.Z. Got: $plugin_version" >&2
            exit 1
          fi

          echo "PLUGIN_VERSION=$plugin_version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$plugin_version" >> "$GITHUB_ENV"

      - name: Ensure version tag is unique
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            existing_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "$existing_commit" != "$current_commit" ]]; then
              echo "Tag ${RELEASE_TAG} already exists on a different commit. Bump build.gradle.kts version before pushing to main." >&2
              exit 1
            fi
          fi

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already points at this commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Build plugin and custom repository
        run: |
          ./gradlew --no-daemon buildPlugin generateCustomPluginRepository \
            -PreleaseTag="${RELEASE_TAG}" \
            -PcustomPluginRepositoryBaseUrl="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/custom-plugin-repository

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
